      React.createElement("button",{style:{width:"100%",background:`linear-gradient(135deg,${G},${GL})`,border:"none",borderRadius:14,padding:16,color:W,fontSize:14,fontWeight:"bold",cursor:"pointer",marginTop:8,boxShadow:`0 4px 20px rgba(30,126,62,0.3)`}},"📄 "+t.download)
    )
  );

  if(screen==="programme") {
    const prog=[{jour:1,lieu:"Dakar → Djeddah",act:"Départ ✈️",ico:"✈️"},{jour:2,lieu:"Makkah",act:"Arrivée — Tawaf d'arrivée",ico:"🕋"},{jour:3,lieu:"Makkah",act:"Umrah complète + Saï",ico:"🤲"},{jour:4,lieu:"Makkah",act:"Visites sites historiques",ico:"🕌"},{jour:5,lieu:"Makkah",act:"1er Ramadan — Taraweeh",ico:"🌙"},{jour:10,lieu:"Médine",act:"Départ vers Médine",ico:"🚌"},{jour:14,lieu:"Médine",act:"Visite Masjid Nabawi",ico:"🕌"},{jour:16,lieu:"Dakar",act:"Retour au Sénégal ✈️",ico:"🏠"}];
    return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
      React.createElement(Header,{title:"🗓️ "+t.programme,onBack:()=>setScreen("home")}),
      React.createElement("div",{style:{padding:16}},
        prog.map((j,i)=>
          React.createElement("div",{key:i,style:{display:"flex",gap:12,marginBottom:12}},
            React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}},
              React.createElement("div",{style:{width:38,height:38,borderRadius:19,background:i===0?`linear-gradient(135deg,${G},${GL})`:"rgba(30,126,62,0.1)",border:`1px solid rgba(30,126,62,0.3)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},j.ico),
              i<prog.length-1&&React.createElement("div",{style:{width:1,flex:1,background:"rgba(30,126,62,0.2)",margin:"4px 0"}})
            ),
            React.createElement(Card,{style:{flex:1,padding:"12px 14px"}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between"}},
                React.createElement("div",{style:{color:GL,fontSize:11,fontWeight:"bold"}},"JOUR "+j.jour),
                React.createElement("div",{style:{color:GR,fontSize:10}},j.lieu)
              ),
              React.createElement("div",{style:{color:W,fontSize:13,marginTop:4}},j.act)
            )
          )
        )
      )
    );
  }

  if(screen==="guide") return React.createElement(Guide,{t,setScreen});
  if(screen==="notifications") return React.createElement(Notifs,{t,setScreen});
  return null;
}

function Guide({t,setScreen}) {
  const [tab,setTab] = useState("invocations");
  const [exp,setExp] = useState(null);
  const invs=[{titre:"Talbiyah",arabe:"لَبَّيْكَ اللَّهُمَّ لَبَّيْكَ",fr:"Me voici ô Allah, me voici !",wo:"Maay fii, Yàlla !",moment:"À l'état d'Ihram"},{titre:"Vue de la Kaaba",arabe:"اللَّهُمَّ زِدْ هَذَا الْبَيْتَ تَشْرِيفًا",fr:"Ô Allah, augmente la vénération de cette Maison",wo:"Yàlla, yokk sa dëkk bii",moment:"Premier regard sur la Kaaba"},{titre:"Début Tawaf",arabe:"بِسْمِ اللَّهِ اللَّهُ أَكْبَرُ",fr:"Au nom d'Allah, Allah est le Plus Grand",wo:"Ci turu Yàlla",moment:"Chaque tour"},{titre:"Coin yéménite",arabe:"رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً",fr:"Seigneur, accorde-nous le bien ici-bas et dans l'au-delà",wo:"Boroom, mayus jàmm ci aduna ak àlam",moment:"Entre Rukn Yamani et Pierre Noire"},{titre:"Zamzam",arabe:"اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا",fr:"Ô Allah, donne-moi une connaissance utile",wo:"Yàlla, may ma xam bu baax",moment:"En buvant l'eau de Zamzam"}];
  const lieux=[{nom:"Masjid al-Haram",ar:"المسجد الحرام",desc:"La Grande Mosquée de Makkah",ico:"🕌",info:"Plus de 2 millions de fidèles"},{nom:"La Kaaba",ar:"الكعبة المشرفة",desc:"La Maison d'Allah",ico:"🕋",info:"Hauteur 15m"},{nom:"Zamzam",ar:"بئر زمزم",desc:"Puits sacré de Hajar ﷺ",ico:"💧",info:"Profondeur 30m"},{nom:"Safa & Marwa",ar:"الصفا والمروة",desc:"7 allers-retours obligatoires",ico:"⛰️",info:"3,15 km total"},{nom:"Masjid Nabawi",ar:"المسجد النبوي",desc:"Mosquée du Prophète ﷺ",ico:"🏛️",info:"Tombeau du Prophète ﷺ"}];

  return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
    React.createElement("div",{style:{background:BG,padding:"50px 20px 0",textAlign:"center",borderBottom:"1px solid #222",position:"relative"}},
      React.createElement("button",{onClick:()=>setScreen("home"),style:{position:"absolute",left:20,top:50,background:"none",border:"none",color:GL,fontSize:22,cursor:"pointer"}},"←"),
      React.createElement("div",{style:{color:W,fontSize:18,fontWeight:"bold",paddingBottom:16}},"📖 "+t.guide),
      React.createElement("div",{style:{display:"flex"}},
        [["invocations","🤲 "+t.invocations],["lieux","🗺️ "+t.holyPlaces]].map(([id,label])=>
          React.createElement("button",{key:id,onClick:()=>{setTab(id);setExp(null);},
            style:{flex:1,background:"none",border:"none",padding:"12px 4px",color:tab===id?GL:GR,borderBottom:tab===id?`2px solid ${G}`:"2px solid transparent",cursor:"pointer",fontSize:12,fontWeight:"bold"}},label)
        )
      )
    ),
    React.createElement("div",{style:{padding:16}},
      tab==="invocations"&&invs.map((inv,i)=>
        React.createElement("div",{key:i,onClick:()=>setExp(exp===i?null:i),
          style:{background:BG2,border:`1px solid ${exp===i?"rgba(30,126,62,0.5)":"#2a2a2a"}`,borderRadius:16,padding:16,marginBottom:12,cursor:"pointer"}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between"}},
            React.createElement("div",{style:{color:W,fontSize:13,fontWeight:"bold"}},inv.titre),
            React.createElement("div",{style:{color:GR}},exp===i?"▲":"▼")
          ),
          React.createElement("div",{style:{color:GL,fontSize:20,textAlign:"right",direction:"rtl",lineHeight:2,marginTop:10,fontFamily:"serif"}},inv.arabe),
          exp===i&&React.createElement("div",null,
            React.createElement("div",{style:{height:1,background:"#2a2a2a",margin:"12px 0"}}),
            React.createElement("div",{style:{color:"#ccc",fontSize:12,fontStyle:"italic",marginBottom:6}},"🇫🇷 "+inv.fr),
            React.createElement("div",{style:{color:"#aaa",fontSize:12,fontStyle:"italic",marginBottom:8}},"🇸🇳 "+inv.wo),
            React.createElement("div",{style:{background:"rgba(30,126,62,0.1)",borderRadius:8,padding:"6px 10px",color:GL,fontSize:11}},"⏰ "+inv.moment)
          )
        )
      ),
      tab==="lieux"&&lieux.map((lieu,i)=>
        React.createElement("div",{key:i,onClick:()=>setExp(exp===i?null:i),
          style:{background:BG2,border:`1px solid ${exp===i?"rgba(30,126,62,0.5)":"#2a2a2a"}`,borderRadius:16,padding:16,marginBottom:10,cursor:"pointer"}},
          React.createElement("div",{style:{display:"flex",gap:12,alignItems:"center"}},
            React.createElement("div",{style:{fontSize:28}},lieu.ico),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{color:W,fontSize:13,fontWeight:"bold"}},lieu.nom),
              React.createElement("div",{style:{color:GL,fontSize:12,fontFamily:"serif"}},lieu.ar)
            ),
            React.createElement("div",{style:{color:GR}},exp===i?"▲":"▼")
          ),
          exp===i&&React.createElement("div",null,
            React.createElement("div",{style:{height:1,background:"#2a2a2a",margin:"12px 0"}}),
            React.createElement("div",{style:{color:"#ccc",fontSize:12,marginBottom:6}},lieu.desc),
            React.createElement("div",{style:{background:"rgba(30,126,62,0.1)",borderRadius:8,padding:"6px 10px",color:GL,fontSize:11}},"ℹ️ "+lieu.info)
          )
        )
      )
    )
  );
}

function Notifs({t,setScreen}) {
  const notifs=[{ico:"🛂",titre:"Visa en cours",desc:"Demande soumise à l'ambassade",temps:"Il y a 2h",lu:false},{ico:"💳",titre:"Paiement reçu",desc:"Votre versement a été confirmé",temps:"Il y a 1 jour",lu:false},{ico:"✈️",titre:"Billet confirmé",desc:"Votre billet a été émis",temps:"Il y a 2 jours",lu:true},{ico:"📋",titre:"Document manquant",desc:"Fournir certificat médical",temps:"Il y a 3 jours",lu:true}];
  return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
    React.createElement(Header,{title:"🔔 "+t.notifications,onBack:()=>setScreen("home")}),
    React.createElement("div",{style:{padding:16}},
      notifs.map((n,i)=>
        React.createElement("div",{key:i,style:{background:BG2,border:`1px solid ${n.lu?"#2a2a2a":"rgba(30,126,62,0.3)"}`,borderRadius:16,padding:16,marginBottom:10,opacity:n.lu?0.5:1}},
          React.createElement("div",{style:{display:"flex",gap:12}},
            React.createElement("div",{style:{fontSize:26}},n.ico),
            React.createElement("div",{style:{flex:1}},
              React.createElement("div",{style:{display:"flex",justifyContent:"space-between"}},
                React.createElement("div",{style:{color:W,fontSize:13,fontWeight:"bold"}},n.titre),
                !n.lu&&React.createElement("div",{style:{width:8,height:8,borderRadius:4,background:GL,marginTop:5}})
              ),
              React.createElement("div",{style:{color:GR,fontSize:11,marginTop:3}},n.desc),
              React.createElement("div",{style:{color:"#444",fontSize:10,marginTop:4}},n.temps)
            )
          )
        )
      )
    )
  );
}

function NavBar({screen,setScreen,t}) {
  const items=[{id:"home",icon:"🏠",label:t.home},{id:"dossier",icon:"📋",label:t.dossier},{id:"paiements",icon:"💳",label:t.paiements},{id:"programme",icon:"🗓️",label:t.programme},{id:"guide",icon:"📖",label:t.guide}];
  return React.createElement("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0a0a0a",borderTop:`1px solid rgba(30,126,62,0.3)`,display:"flex",justifyContent:"space-around",padding:"10px 0 20px",zIndex:100}},
    items.map(item=>
      React.createElement("button",{key:item.id,onClick:()=>setScreen(item.id),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"0 8px"}},
        React.createElement("div",{style:{fontSize:22}},item.icon),
        React.createElement("div",{style:{fontSize:9,color:screen===item.id?GL:"#444",fontWeight:screen===item.id?"bold":"normal"}},item.label)
      )
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
