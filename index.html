/* ── INIT ── */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    document.getElementById("app").style.display="block";
    init();
    renderHome();
    showPage("home");

});

function init(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p=>{STATE.loc={lat:p.coords.latitude,lng:p.coords.longitude};loadPrayerTimes();loadCity();},
      ()=>{STATE.loc={lat:14.6937,lng:-17.4441};loadPrayerTimes();}
    );
  } else {STATE.loc={lat:14.6937,lng:-17.4441};loadPrayerTimes();}
  setInterval(updateCountdown,1000);
  if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
}

function loadCity(){
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${STATE.loc.lat}&lon=${STATE.loc.lng}&format=json`)
    .then(r=>r.json()).then(d=>{STATE.city=d.address?.city||d.address?.town||"Dakar";if(STATE.currentPage==="home")renderHome();}).catch(()=>{});
}

function loadPrayerTimes(){
  const d=new Date();
  fetch(`https://api.aladhan.com/v1/timings/${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()}?latitude=${STATE.loc.lat}&longitude=${STATE.loc.lng}&method=2`)
    .then(r=>r.json()).then(data=>{
      STATE.prayerTimes=data.data.timings;
      STATE.hijri=data.data.date.hijri;
      calcQibla();
      if(STATE.currentPage==="home") renderHome();
      if(STATE.currentPage==="prieres") renderPrieres();
    }).catch(()=>{});
}

function calcQibla(){
  if(!STATE.loc) return;
  const lat1=STATE.loc.lat*Math.PI/180,lat2=21.4225*Math.PI/180,dLng=(39.8262-STATE.loc.lng)*Math.PI/180;
  const y=Math.sin(dLng)*Math.cos(lat2);
  const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
  STATE.qibla=Math.round((Math.atan2(y,x)*180/Math.PI+360)%360);
}

function updateCountdown(){
  if(!STATE.prayerTimes) return;
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0");
  const nowStr=`${hh}:${mm}`;
  PRAYERS.forEach(p=>{
    const t=STATE.prayerTimes[p]?.substring(0,5);
    if(t===nowStr&&STATE.lastAzan[p]!==nowStr){
      STATE.lastAzan[p]=nowStr;
      const isNight=["Fajr","Isha"].includes(p);
      new Audio(isNight?"https://cdn.islamic.network/mp3/prayer-times/azan/Madinah.mp3":"https://cdn.islamic.network/mp3/prayer-times/azan/Makkah.mp3").play().catch(()=>{});
    }
  });
  const list=PRAYERS.map(p=>{
    const[h,m]=(STATE.prayerTimes[p]||"00:00").split(":").map(Number);
    const d=new Date();d.setHours(h,m,0,0);
    return{name:p,time:STATE.prayerTimes[p],diff:d-now};
  });
  const nxt=list.filter(p=>p.diff>0).sort((a,b)=>a.diff-b.diff)[0];
  if(nxt){
    STATE.nextPrayer=nxt;
    const h=Math.floor(nxt.diff/3600000),m=Math.floor((nxt.diff%3600000)/60000),s=Math.floor((nxt.diff%60000)/1000);
    STATE.countdown=`${h}h ${m}m ${s}s`;
    const el=document.getElementById("countdown-el");
    if(el) el.textContent=STATE.countdown;
  }
}

/* ── NAVIGATION ── */
function showPage(id){

  document.getElementById("pg-"+id).style.display="block";
  document.querySelectorAll(".nav-btn").forEach(b=>{b.style.color="#444";b.querySelector("div:last-child").style.fontWeight="normal";});
  const nav=document.getElementById("nav-"+id);
  if(nav){nav.style.color="#25a050";nav.querySelector("div:last-child").style.fontWeight="bold";}
  STATE.currentPage=id;
  window.scrollTo(0,0);
  if(id==="home") renderHome();
  if(id==="prieres") renderPrieres();
  if(id==="coran") renderCoran();
  if(id==="dhikr") renderDhikr();
  if(id==="espace") renderEspace();
}

function activerBoussole(){
  if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
    DeviceOrientationEvent.requestPermission().then(p=>{
      if(p==="granted"){STATE.hasCompass=true;window.addEventListener("deviceorientation",handleOrientation,true);renderPrieresContent();}
    }).catch(()=>{});
  } else {
    STATE.hasCompass=true;
    window.addEventListener("deviceorientation",handleOrientation,true);
    renderPrieresContent();
  }
}

function handleOrientation(e){
  STATE.compass=e.webkitCompassHeading!=null?e.webkitCompassHeading:(360-e.alpha)||0;
  const el=document.getElementById("qibla-arrow");
  if(el) el.style.transform=`rotate(${STATE.qibla-STATE.compass}deg)`;
}

function renderDhikr(){

  const circ=2*Math.PI*88;
  document.getElementById("pg-dhikr").innerHTML=`
  <div style="padding-bottom:80px;animation:fadeIn 0.4s ease;">
    <div style="background:#111;padding:50px 16px 16px;border-bottom:1px solid #222;text-align:center;">
      <div style="font-size:18px;font-weight:bold;">📿 Dhikr & Tasbih</div>
    </div>
    <div style="overflow-x:auto;display:flex;gap:8px;padding:14px 16px 0;scrollbar-width:none;">
      ${DHIKRS.map((dh,i)=>`
      <button onclick="selectDhikr(${i})" style="flex-shrink:0;background:${i===STATE.dhikrSel?`linear-gradient(135deg,${G},${GL})`:"#1a1a1a"};border:1px solid ${i===STATE.dhikrSel?G:"#333"};border-radius:20px;padding:6px 14px;color:#fff;font-size:11px;cursor:pointer;white-space:nowrap;font-family:Georgia,serif;">${dh.fr.split(" ").slice(0,2).join(" ")}</button>`).join("")}
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;padding:28px 20px;">
      <div style="color:${done?"#2ecc71":GL};font-size:24px;text-align:center;direction:rtl;font-family:serif;margin-bottom:6px;line-height:1.8;">${d.ar}</div>
      <div style="color:#8a8a8a;font-size:13px;margin-bottom:28px;font-style:italic;">${d.fr}</div>
      <div style="position:relative;width:200px;height:200px;margin-bottom:20px;" id="dhikr-wrap">
        <svg width="200" height="200" style="position:absolute;top:0;left:0;transform:rotate(-90deg);">
          <circle cx="100" cy="100" r="88" fill="none" stroke="#222" stroke-width="12"/>
          <circle cx="100" cy="100" r="88" fill="none" stroke="${done?"#2ecc71":GL}" stroke-width="12"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"
            stroke-linecap="round" style="transition:stroke-dashoffset 0.2s,stroke 0.3s;"/>
        </svg>
        <button onclick="tapDhikr()" id="dhikr-btn"
          style="position:absolute;inset:0;background:${done?`linear-gradient(135deg,#1a5c2a,#2ecc71)`:`linear-gradient(135deg,#0d2b1a,#1a4a2a)`};border:none;border-radius:50%;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.15s;">
          <div style="color:${done?"#2ecc71":"#fff"};font-size:60px;font-weight:bold;line-height:1;">${STATE.dhikrCount}</div>
          <div style="color:#8a8a8a;font-size:12px;margin-top:4px;">/ ${d.target}</div>
        </button>
      </div>
      ${done?`<div style="color:#2ecc71;font-size:15px;margin-bottom:12px;font-weight:bold;animation:pulse 1.5s ease infinite;">✅ Alhamdulillah ! بارك الله فيك</div>`:""}
      <div style="display:flex;gap:12px;">
        <button onclick="resetDhikr()" style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 20px;color:#8a8a8a;font-size:13px;cursor:pointer;font-family:Georgia,serif;">↺ Reset</button>
        <div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px 20px;color:#8a8a8a;font-size:13px;">Total: ${STATE.dhikrTotal}</div>
      </div>
    </div>
  </div>`;
}

function selectDhikr(i){STATE.dhikrSel=i;STATE.dhikrCount=0;renderDhikr();}
function resetDhikr(){STATE.dhikrCount=0;renderDhikr();}

function tapDhikr(){
  STATE.dhikrCount++;STATE.dhikrTotal++;
  const btn=document.getElementById("dhikr-btn");
  if(btn){btn.style.transform="scale(0.95)";setTimeout(()=>btn.style.transform="scale(1)",150);}
  const wrap=document.getElementById("dhikr-wrap");
  if(wrap){
    const rip=document.createElement("div");
    rip.style.cssText=`position:absolute;inset:0;border-radius:50%;border:3px solid ${GL};animation:ripple 0.8s ease-out forwards;pointer-events:none;`;
    wrap.appendChild(rip);setTimeout(()=>rip.remove(),800);
  }
  renderDhikr();
}

  </div>

  const items=document.getElementById("guide-items");

    items.innerHTML=invs.map((inv,i)=>`
    <div onclick="toggleGuide(${i})" style="background:#1a1a1a;border:1px solid ${STATE.guideExp===i?"rgba(30,126,62,0.5)":"#2a2a2a"};border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;">

      <div style="height:1px;background:#2a2a2a;margin:12px 0;"></div>

function setGuideTab(tab){STATE.guideTab=tab;STATE.guideExp=null;renderEspace();}
function toggleGuide(i){STATE.guideExp=STATE.guideExp===i?null:i;renderEspace();}

/* ── ESPACE LOGIN ── */
function renderEspaceLogin(){
  document.getElementById("pg-espace").innerHTML=`
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;padding:24px;animation:fadeIn 0.4s ease;">
    <div style="width:100%;max-width:360px;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="width:70px;height:70px;border-radius:35px;background:linear-gradient(135deg,${G},${GL});display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;box-shadow:0 0 30px rgba(30,126,62,0.3);">🕌</div>
        <div style="font-size:20px;font-weight:bold;">Mon Espace Pèlerin</div>
        <div style="color:#8a8a8a;font-size:12px;margin-top:4px;">Entrez votre numéro pour accéder à votre dossier</div>
      </div>
      <div id="login-error" style="display:none;background:rgba(200,50,50,0.1);border:1px solid rgba(200,50,50,0.3);border-radius:12px;padding:12px;color:#ff6b6b;font-size:13px;margin-bottom:14px;text-align:center;"></div>
      <div style="color:#8a8a8a;font-size:12px;margin-bottom:8px;">Votre numéro Sénégalais</div>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px 12px;font-size:14px;white-space:nowrap;">🇸🇳 +221</div>
        <input type="tel" id="login-phone" placeholder="77 123 45 67" oninput="checkPhone()" style="flex:1;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px 16px;color:#fff;font-size:16px;outline:none;font-family:Georgia,serif;"/>
      </div>
      <button id="login-btn" onclick="loginPelerin()" disabled style="width:100%;background:#222;border:none;border-radius:14px;padding:16px;color:#fff;font-size:15px;font-weight:bold;cursor:not-allowed;font-family:Georgia,serif;">Accéder à mon espace</button>
      <div style="text-align:center;margin-top:20px;color:#333;font-size:11px;">Kyswa Travel • +221 78 781 16 16</div>
    </div>
  </div>`;
}

function checkPhone(){
  const phone=document.getElementById("login-phone")?.value||"";
  const btn=document.getElementById("login-btn");
  if(!btn) return;
  if(phone.length>=8){
    btn.disabled=false;
    btn.style.background=`linear-gradient(135deg,${G},${GL})`;
    btn.style.cursor="pointer";
    btn.style.boxShadow="0 4px 20px rgba(30,126,62,0.3)";
  } else {
    btn.disabled=true;
    btn.style.background="#222";
    btn.style.cursor="not-allowed";
    btn.style.boxShadow="none";
  }
}

async function loginPelerin(){
  const phone=document.getElementById("login-phone")?.value||"";
  const btn=document.getElementById("login-btn");
  const errEl=document.getElementById("login-error");
  if(btn) btn.textContent="Recherche en cours...";
  const cleaned=phone.replace(/\s/g,"").replace(/[^0-9]/g,"");
  const last9=cleaned.slice(-9);
  const variants=[last9,`+221${last9}`,`221${last9}`,`0${last9}`,cleaned,`+221${cleaned}`];
  for(const v of variants){
    try{
      const res=await fetch(`${SB_URL}/rest/v1/clients?telephone=eq.${encodeURIComponent(v)}&select=*,inscriptions(*,departs(*),paiements(*))`,{headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`}});
      const data=await res.json();
      if(data&&data.length>0){
        STATE.pelerin=data[0];
        renderEspace();
        return;
      }
    }catch(e){}
  }
  if(errEl){errEl.style.display="block";errEl.textContent="Numéro non trouvé. Contactez Kyswa Travel au +221 78 781 16 16";}
  if(btn) btn.textContent="Accéder à mon espace";
}

function deconnecterPelerin(){
  STATE.pelerin=null;
  STATE.espaceTab="home";
  document.getElementById("espace-dot").style.display="none";
  renderEspaceLogin();
}
