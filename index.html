              ),

function PrieresTab({prayerTimes,loc}) {
  const [tab,setTab]=useState("horaires");
  const [qibla,setQibla]=useState(null);
  const [device,setDevice]=useState(0);

  useEffect(()=>{
    const lat1=loc.lat*Math.PI/180,lat2=21.4225*Math.PI/180,dLng=(39.8262-loc.lng)*Math.PI/180;
    const y=Math.sin(dLng)*Math.cos(lat2),x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLng);
    setQibla(Math.round((Math.atan2(y,x)*180/Math.PI+360)%360));
    const fn=e=>{if(e.webkitCompassHeading)setDevice(e.webkitCompassHeading);else if(e.alpha)setDevice(360-e.alpha);};
    window.addEventListener("deviceorientation",fn);
    return()=>window.removeEventListener("deviceorientation",fn);
  },[loc]);

  const now=new Date();
  const prayers=PRAYERS.map(p=>{
    if(!prayerTimes) return{name:p,time:"--:--",passed:false};
    const [h,m]=prayerTimes[p].split(":").map(Number);
    const d=new Date();d.setHours(h,m,0);
    return{name:p,time:prayerTimes[p],passed:d<now};
  });

  return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
    React.createElement("div",{style:{background:BG,padding:"50px 20px 0",borderBottom:"1px solid #222"}},
      React.createElement("div",{style:{color:W,fontSize:18,fontWeight:"bold",textAlign:"center",paddingBottom:16}},"🕌 Prières"),
      React.createElement("div",{style:{display:"flex"}},
        [["horaires","⏰ Horaires"],["qibla","🧭 Qibla"]].map(([id,label])=>
          React.createElement("button",{key:id,onClick:()=>setTab(id),style:{flex:1,background:"none",border:"none",padding:"12px 4px",color:tab===id?GL:GR,borderBottom:tab===id?`2px solid ${G}`:"2px solid transparent",cursor:"pointer",fontSize:12,fontWeight:"bold"}},label)

    ),
    tab==="horaires"&&React.createElement("div",{style:{padding:16}},
      prayers.map((p,i)=>
        React.createElement("div",{key:i,style:{background:BG2,border:`1px solid ${p.passed?"#222":"rgba(30,126,62,0.3)"}`,borderRadius:14,padding:"16px 20px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",opacity:p.passed?0.45:1}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12}},
            React.createElement("div",{style:{fontSize:24}},PICONS[p.name]),
            React.createElement("div",null,
              React.createElement("div",{style:{color:W,fontSize:15,fontWeight:"bold"}},p.name),
              p.passed&&React.createElement("div",{style:{color:GR,fontSize:10}},"Passée")
            )
          ),
          React.createElement("div",{style:{color:p.passed?GR:GL,fontSize:22,fontWeight:"bold"}},p.time)
        )
      )
    ),
    tab==="qibla"&&React.createElement("div",{style:{padding:16,textAlign:"center"}},
      React.createElement("div",{style:{color:GR,fontSize:13,marginBottom:24}},"Boussole orientée vers La Mecque"),
      React.createElement("div",{style:{position:"relative",width:240,height:240,margin:"0 auto 24px"}},
        React.createElement("div",{style:{width:240,height:240,borderRadius:120,border:`3px solid rgba(30,126,62,0.3)`,background:BG2,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}},
          React.createElement("div",{style:{position:"absolute",top:10,left:"50%",transform:"translateX(-50%)",color:GR,fontSize:11}},"N"),
          React.createElement("div",{style:{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",color:GR,fontSize:11}},"S"),
          React.createElement("div",{style:{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:GR,fontSize:11}},"O"),
          React.createElement("div",{style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",color:GR,fontSize:11}},"E"),
          React.createElement("div",{style:{position:"absolute",width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",paddingTop:20,transform:`rotate(${qibla?qibla-device:0}deg)`,transition:"transform 0.3s"}},
            React.createElement("div",{style:{fontSize:30}},"🕋"),
            React.createElement("div",{style:{width:2,height:60,background:`linear-gradient(${GL},transparent)`,marginTop:4}})
          ),
          React.createElement("div",{style:{fontSize:18}},"📍")
        )
      ),
      qibla&&React.createElement("div",{style:{background:BG2,border:`1px solid rgba(30,126,62,0.3)`,borderRadius:14,padding:16,display:"inline-block"}},
        React.createElement("div",{style:{color:GR,fontSize:11}},"Direction Qibla"),
        React.createElement("div",{style:{color:GL,fontSize:30,fontWeight:"bold"}},qibla+"°"),

function CoranTab() {
  const [selected,setSelected]=useState(null);
  const [verses,setVerses]=useState([]);
  const [loading,setLoading]=useState(false);
  const [search,setSearch]=useState("");

  const open=async(s)=>{
    setSelected(s);setLoading(true);setVerses([]);
    try{const r=await fetch(`https://api.alquran.cloud/v1/surah/${s.n}`);const d=await r.json();setVerses(d.data.ayahs);}catch(e){}
    setLoading(false);
  };

  const filtered=SURAHS.filter(s=>s.name.toLowerCase().includes(search.toLowerCase())||s.ar.includes(search)||String(s.n).includes(search));

  if(selected) return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
    React.createElement("div",{style:{background:BG,padding:"50px 16px 16px",borderBottom:"1px solid #222",position:"relative",textAlign:"center"}},
      React.createElement("button",{onClick:()=>setSelected(null),style:{position:"absolute",left:16,top:50,background:"none",border:"none",color:GL,fontSize:22,cursor:"pointer"}},"←"),
      React.createElement("div",{style:{color:W,fontSize:16,fontWeight:"bold"}},selected.name),
      React.createElement("div",{style:{color:GL,fontSize:14,fontFamily:"serif"}},selected.ar),
      React.createElement("div",{style:{color:GR,fontSize:11,marginTop:2}},selected.v+" versets")
    ),
    React.createElement("div",{style:{padding:16}},
      loading?React.createElement("div",{style:{textAlign:"center",color:GR,padding:40}},"Chargement..."):
      React.createElement("div",null,
        React.createElement("div",{style:{color:GL,fontSize:22,textAlign:"center",fontFamily:"serif",padding:"16px 0",lineHeight:2}},"بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ"),
        verses.map((v,i)=>
          React.createElement("div",{key:i,style:{background:BG2,border:"1px solid #222",borderRadius:12,padding:16,marginBottom:10}},
            React.createElement("div",{style:{color:GR,fontSize:10,marginBottom:8}},selected.n+":"+v.numberInSurah),
            React.createElement("div",{style:{color:GL,fontSize:18,textAlign:"right",direction:"rtl",lineHeight:1.8,fontFamily:"serif"}},v.text)

  );

  return React.createElement("div",{className:"fade",style:{paddingBottom:80}},
    React.createElement("div",{style:{background:BG,padding:"50px 16px 16px",borderBottom:"1px solid #222"}},
      React.createElement("div",{style:{color:W,fontSize:18,fontWeight:"bold",textAlign:"center",marginBottom:14}},"📖 Coran"),
      React.createElement("input",{value:search,onChange:e=>setSearch(e.target.value),placeholder:"🔍 Rechercher une sourate...",style:{width:"100%",background:BG2,border:"1px solid #333",borderRadius:12,padding:"12px 16px",color:W,fontSize:14,outline:"none",boxSizing:"border-box"}})
    ),

      filtered.map((s,i)=>
        React.createElement("div",{key:i,onClick:()=>open(s),style:{background:BG2,border:"1px solid #222",borderRadius:14,padding:"14px 16px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:12}},
            React.createElement("div",{style:{width:34,height:34,borderRadius:17,background:`linear-gradient(135deg,${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",color:W,fontSize:11,fontWeight:"bold"}},s.n),

              React.createElement("div",{style:{color:W,fontSize:13,fontWeight:"bold"}},s.name),

function DhikrTab() {
  const [sel,setSel]=useState(0);
  const [count,setCount]=useState(0);
  const [total,setTotal]=useState(0);

    ["Prénom *","Nom *","Email (optionnel)"].map((label,i)=>{
      const vals=[prenom,nom,email];
      const setters=[setPrenom,setNom,setEmail];
      const types=["text","text","email"];
      const placeholders=["Moussa","Diallo","email@exemple.com"];
      return React.createElement("div",{key:i},
        React.createElement("div",{style:{color:GR,fontSize:12,marginBottom:6}},label),
        React.createElement("input",{type:types[i],value:vals[i],onChange:e=>setters[i](e.target.value),placeholder:placeholders[i],style:{width:"100%",background:BG2,border:`1px solid ${vals[i]?G:"#333"}`,borderRadius:12,padding:"14px 16px",color:W,fontSize:15,outline:"none",marginBottom:12,boxSizing:"border-box"}})
      );
    }),
    React.createElement("button",{onClick:inscrire,disabled:loading||!prenom||!nom,style:{width:"100%",background:prenom&&nom?`linear-gradient(135deg,${G},${GL})`:"#222",border:"none",borderRadius:14,padding:16,color:W,fontSize:15,fontWeight:"bold",cursor:"pointer",marginBottom:10}},loading?"Enregistrement...":"✅ Créer mon dossier"),
    React.createElement("button",{onClick:()=>setShowForm(false),style:{width:"100%",background:"none",border:"1px solid #333",borderRadius:14,padding:14,color:GR,fontSize:13,cursor:"pointer"}},"← Réessayer")
  );

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"75vh",padding:24}},
    React.createElement("div",{style:{width:"100%",maxWidth:360}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:32}},
        React.createElement("div",{style:{width:70,height:70,borderRadius:35,background:`linear-gradient(135deg,${G},${GL})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,margin:"0 auto 14px"}},"🕌"),
        React.createElement("div",{style:{color:W,fontSize:20,fontWeight:"bold"}},"Mon Espace Pèlerin"),
        React.createElement("div",{style:{color:GR,fontSize:12,marginTop:4}},"Accédez à votre dossier Kyswa Travel")
      ),
      error&&React.createElement("div",{style:{background:"rgba(200,50,50,0.1)",border:"1px solid rgba(200,50,50,0.3)",borderRadius:12,padding:12,color:"#ff6b6b",fontSize:13,marginBottom:14,textAlign:"center"}},error),
      React.createElement("div",{style:{color:GR,fontSize:12,marginBottom:8}},"Votre numéro de téléphone"),
      React.createElement("div",{style:{display:"flex",gap:8,marginBottom:16}},
        React.createElement("div",{style:{background:BG2,border:"1px solid #333",borderRadius:12,padding:"14px 12px",color:W,fontSize:14}},"🇸🇳 +221"),
        React.createElement("input",{type:"tel",value:phone,onChange:e=>setPhone(e.target.value),onKeyDown:e=>e.key==="Enter"&&handleLogin(),placeholder:"77 123 45 67",style:{flex:1,background:BG2,border:`1px solid ${phone.length>=8?G:"#333"}`,borderRadius:12,padding:"14px 16px",color:W,fontSize:16,outline:"none"}})
      ),
      React.createElement("button",{onClick:handleLogin,disabled:loading||phone.length<8,style:{width:"100%",background:phone.length>=8?`linear-gradient(135deg,${G},${GL})`:"#222",border:"none",borderRadius:14,padding:16,color:W,fontSize:15,fontWeight:"bold",cursor:phone.length>=8?"pointer":"not-allowed"}},loading?"Recherche...":"Accéder à mon espace")
    )
  );
}

function BottomNav({tab,setTab,pelerin}) {
  const items=[{id:"home",icon:"🏠",label:"Accueil"},{id:"prieres",icon:"🕌",label:"Prières"},{id:"coran",icon:"📖",label:"Coran"},{id:"dhikr",icon:"📿",label:"Dhikr"},{id:"espace",icon:"👤",label:"Mon Espace"}];
  return React.createElement("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"#0a0a0a",borderTop:`1px solid rgba(30,126,62,0.3)`,display:"flex",justifyContent:"space-around",padding:"10px 0 20px",zIndex:100}},
    items.map(item=>
      React.createElement("button",{key:item.id,onClick:()=>setTab(item.id),style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"0 6px",position:"relative"}},
        item.id==="espace"&&pelerin&&React.createElement("div",{style:{position:"absolute",top:-2,right:2,width:8,height:8,borderRadius:4,background:GL}}),
        React.createElement("div",{style:{fontSize:22}},item.icon),
        React.createElement("div",{style:{fontSize:9,color:tab===item.id?GL:"#444",fontWeight:tab===item.id?"bold":"normal"}},item.label)
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
